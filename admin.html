<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal — Napolitani Investments</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c;
      --dark: #1a1a2e;
      --mid:  #16213e;
      --panel:#0f3460;
      --text: #e0e0e0;
      --muted:#9aa0b0;
      --green:#27ae60;
      --yellow:#f39c12;
      --red:  #e74c3c;
      --blue: #2980b9;
      --border:#2a3a5c;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

    /* ── LOGIN ─────────────────────────────────────────────── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, var(--dark) 0%, var(--mid) 100%);
    }
    .login-card {
      background: var(--mid); border: 1px solid var(--border);
      border-radius: 12px; padding: 48px 40px; width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .login-logo img { height: 44px; filter: brightness(0) invert(1); }
    .login-logo span { font-size: 1.1rem; font-weight: 600; color: var(--gold); }
    .login-card h1 { font-size: 1.4rem; margin-bottom: 8px; }
    .login-card p  { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }
    .lf-group { margin-bottom: 18px; }
    .lf-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .lf-group input {
      width: 100%; padding: 11px 14px; background: var(--dark);
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-size: 0.95rem; outline: none;
      transition: border-color 0.2s;
    }
    .lf-group input:focus { border-color: var(--gold); }
    #login-err { display: none; background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #e74c3c; border-radius: 7px; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 16px; }
    .btn-login {
      width: 100%; padding: 12px; background: var(--gold); color: #1a1208;
      font-weight: 700; font-size: 1rem; border: none; border-radius: 7px;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── APP SHELL ──────────────────────────────────────────── */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    /* Topbar */
    .topbar {
      background: var(--mid); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar-left img { height: 34px; filter: brightness(0) invert(1); }
    .topbar-left span { font-weight: 600; color: var(--gold); font-size: 0.95rem; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-right .admin-email { font-size: 0.8rem; color: var(--muted); }
    .btn-signout {
      padding: 6px 14px; background: transparent; border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); font-size: 0.8rem; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-signout:hover { border-color: var(--red); color: var(--red); }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 16px; padding: 16px 24px;
      background: var(--mid); border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat-card {
      flex: 1; min-width: 120px; background: var(--dark);
      border: 1px solid var(--border); border-radius: 9px;
      padding: 14px 18px;
    }
    .stat-card .stat-val { font-size: 1.8rem; font-weight: 700; color: var(--gold); }
    .stat-card .stat-lbl { font-size: 0.73rem; color: var(--muted); margin-top: 2px; }

    /* Tabs */
    .tab-row {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      background: var(--mid); padding: 0 24px;
    }
    .tab-btn {
      padding: 13px 22px; background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.9rem; font-weight: 500;
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* Filter chips */
    .filter-row {
      display: flex; gap: 8px; padding: 12px 24px;
      background: var(--dark); border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .chip {
      padding: 5px 14px; border-radius: 20px; font-size: 0.78rem; cursor: pointer;
      border: 1px solid var(--border); background: var(--mid); color: var(--muted);
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--gold); color: var(--gold); }
    .chip.active { background: var(--gold); color: #1a1208; border-color: var(--gold); font-weight: 600; }

    /* Split layout */
    .split { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* List pane */
    .list-pane {
      width: 420px; min-width: 320px; border-right: 1px solid var(--border);
      overflow-y: auto; background: var(--dark);
    }
    .app-row {
      padding: 14px 18px; border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background 0.15s;
    }
    .app-row:hover { background: var(--mid); }
    .app-row.selected { background: var(--panel); border-left: 3px solid var(--gold); }
    .app-row-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 3px; }
    .app-row-meta { font-size: 0.75rem; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
    .app-row-meta span { display: flex; align-items: center; gap: 3px; }
    .badge {
      display: inline-block; padding: 2px 9px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .badge-pending  { background: rgba(243,156,18,0.15); color: #f39c12; }
    .badge-vetting_fee_received { background: rgba(41,128,185,0.15); color: #5dade2; }
    .badge-approved_to_view { background: rgba(39,174,96,0.15); color: #2ecc71; }
    .badge-in_review { background: rgba(41,128,185,0.15); color: #5dade2; }
    .badge-approved  { background: rgba(39,174,96,0.15); color: #2ecc71; }
    .badge-conditional { background: rgba(142,68,173,0.15); color: #bb8fce; }
    .badge-declined  { background: rgba(231,76,60,0.15); color: #e74c3c; }
    .no-results { padding: 48px 24px; text-align: center; color: var(--muted); font-size: 0.9rem; }

    /* Detail pane */
    .detail-pane {
      flex: 1; overflow-y: auto; padding: 0; background: var(--dark);
    }
    .detail-empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--muted); font-size: 0.9rem;
    }
    .detail-header {
      padding: 20px 28px 16px; background: var(--mid);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
    }
    .detail-header h2 { font-size: 1.2rem; margin-bottom: 6px; }
    .detail-header-meta { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
    .detail-header-meta span { font-size: 0.78rem; color: var(--muted); }

    .ratio-chip {
      padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700;
    }
    .ratio-green  { background: rgba(39,174,96,0.2);  color: #2ecc71; }
    .ratio-yellow { background: rgba(243,156,18,0.2); color: #f39c12; }
    .ratio-red    { background: rgba(231,76,60,0.2);  color: #e74c3c; }

    /* Status updater */
    .status-row {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 28px; background: var(--panel); border-bottom: 1px solid var(--border);
    }
    .status-row label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
    .status-row select {
      flex: 1; padding: 8px 12px; background: var(--mid);
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-size: 0.85rem; outline: none; cursor: pointer;
    }
    .btn-save {
      padding: 8px 18px; background: var(--gold); color: #1a1208;
      border: none; border-radius: 7px; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; white-space: nowrap; transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.85; }
    .save-msg { font-size: 0.78rem; color: var(--green); display: none; }

    /* Detail sections */
    .detail-body { padding: 24px 28px; }
    .detail-section { margin-bottom: 28px; }
    .detail-section h3 {
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--gold); margin-bottom: 14px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .detail-field label { font-size: 0.72rem; color: var(--muted); display: block; margin-bottom: 3px; }
    .detail-field span { font-size: 0.88rem; }

    /* Mini tables for jsonb arrays */
    .mini-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .mini-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: 0.72rem; text-transform: uppercase; }
    .mini-table td { padding: 8px 10px; border-bottom: 1px solid rgba(42,58,92,0.5); }
    .mini-table tr:last-child td { border-bottom: none; }

    /* Declarations */
    .decl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .decl-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
    .decl-yes { color: var(--red); }
    .decl-no  { color: var(--green); }

    /* Spinner */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(201,168,76,0.3); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Export buttons ─────────────────────────────────────── */
    .btn-export {
      padding: 7px 15px; background: #1a6b2e; color: #d4f5dc;
      border: 1px solid #27ae60; border-radius: 7px; font-weight: 600;
      font-size: 0.82rem; cursor: pointer; white-space: nowrap;
      transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-export:hover { background: #27ae60; color: #fff; }
    .filter-export-wrap {
      margin-left: auto; display: flex; align-items: center;
    }
    .btn-export-all {
      padding: 5px 14px; border-radius: 20px; font-size: 0.78rem; cursor: pointer;
      border: 1px solid #27ae60; background: rgba(39,174,96,0.08); color: #2ecc71;
      transition: all 0.15s; font-weight: 500;
    }
    .btn-export-all:hover { background: rgba(39,174,96,0.22); }

    @media (max-width: 900px) {
      .split { flex-direction: column; }
      .list-pane { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 340px; }
    }
    @media (max-width: 600px) {
      .stats-bar { padding: 12px 14px; gap: 10px; }
      .detail-body { padding: 16px 14px; }
      .status-row { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo-transparent.png" alt="Napolitani Investments" />
      <span>Napolitani Investments</span>
    </div>
    <h1>Admin Portal</h1>
    <p>Sign in with your staff credentials to manage rental applications.</p>
    <div id="login-err"></div>
    <div class="lf-group">
      <label for="l-email">Email address</label>
      <input type="email" id="l-email" placeholder="you@napolifunds.co.za" autocomplete="username" />
    </div>
    <div class="lf-group">
      <label for="l-pass">Password</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-login" id="btn-login">Sign in</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <img src="logo-transparent.png" alt="Napolitani" />
      <span>Admin Portal</span>
    </div>
    <div class="topbar-right">
      <span class="admin-email" id="admin-email-display"></span>
      <button class="btn-signout" id="btn-signout">Sign out</button>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-val" id="st-pre">—</div><div class="stat-lbl">Pre-Applications</div></div>
    <div class="stat-card"><div class="stat-val" id="st-full">—</div><div class="stat-lbl">Full Applications</div></div>
    <div class="stat-card"><div class="stat-val" id="st-pending">—</div><div class="stat-lbl">Pending Review</div></div>
    <div class="stat-card"><div class="stat-val" id="st-approved">—</div><div class="stat-lbl">Approved</div></div>
  </div>

  <!-- Tabs -->
  <div class="tab-row">
    <button class="tab-btn active" data-tab="pre">Pre-Applications</button>
    <button class="tab-btn" data-tab="full">Full Applications</button>
  </div>

  <!-- Filters -->
  <div class="filter-row" id="filter-row"></div>

  <!-- Split: list | detail -->
  <div class="split">
    <div class="list-pane" id="list-pane">
      <div class="no-results">Loading…</div>
    </div>
    <div class="detail-pane" id="detail-pane">
      <div class="detail-empty">← Select an application to view details</div>
    </div>
  </div>

</div>

<!-- SheetJS — client-side Excel generation -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>

<script>
(function () {
  'use strict';

  /* ── Supabase client ───────────────────────────────────────── */
  var _client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* ── State ─────────────────────────────────────────────────── */
  var state = {
    tab: 'pre',          // 'pre' | 'full'
    filter: 'all',
    preApps: [],
    fullApps: [],
    selectedId: null
  };

  var PRE_STATUSES  = ['all','pending','vetting_fee_received','approved_to_view','declined'];
  var FULL_STATUSES = ['all','pending','in_review','approved','conditional','declined'];

  function prettyStatus(s) {
    return (s || '').replace(/_/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
  }

  /* ── DOM refs ──────────────────────────────────────────────── */
  var loginScreen = document.getElementById('login-screen');
  var appShell    = document.getElementById('app');
  var btnLogin    = document.getElementById('btn-login');
  var loginErr    = document.getElementById('login-err');
  var btnSignout  = document.getElementById('btn-signout');
  var emailDisp   = document.getElementById('admin-email-display');
  var filterRow   = document.getElementById('filter-row');
  var listPane    = document.getElementById('list-pane');
  var detailPane  = document.getElementById('detail-pane');
  var tabBtns     = document.querySelectorAll('.tab-btn');

  /* ── AUTH ──────────────────────────────────────────────────── */
  function showLogin() { loginScreen.style.display = 'flex'; appShell.style.display = 'none'; }
  function showApp(email) {
    loginScreen.style.display = 'none';
    appShell.style.display    = 'flex';
    appShell.style.flexDirection = 'column';
    emailDisp.textContent = email || '';
    loadAll();
  }

  btnLogin.addEventListener('click', function () {
    var email = document.getElementById('l-email').value.trim();
    var pass  = document.getElementById('l-pass').value;
    if (!email || !pass) { showErr('Please enter your email and password.'); return; }
    btnLogin.disabled = true;
    btnLogin.textContent = 'Signing in…';
    loginErr.style.display = 'none';
    _client.auth.signInWithPassword({ email: email, password: pass })
      .then(function(res) {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Sign in';
        if (res.error) { showErr(res.error.message); return; }
        showApp(res.data.user.email);
      });
  });

  document.getElementById('l-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') btnLogin.click();
  });

  btnSignout.addEventListener('click', function () {
    _client.auth.signOut().then(function() { showLogin(); });
  });

  function showErr(msg) {
    loginErr.textContent = msg;
    loginErr.style.display = 'block';
  }

  /* Check existing session on load */
  _client.auth.getSession().then(function(res) {
    if (res.data && res.data.session) {
      showApp(res.data.session.user.email);
    } else {
      showLogin();
    }
  });

  /* ── DATA LOADING ──────────────────────────────────────────── */
  function loadAll() {
    listPane.innerHTML = '<div class="no-results"><span class="spinner"></span> Loading…</div>';
    Promise.all([
      _client.from('pre_applications').select('*').order('created_at', { ascending: false }),
      _client.from('rental_applications').select('*').order('created_at', { ascending: false })
    ]).then(function(results) {
      var preRes  = results[0];
      var fullRes = results[1];
      state.preApps  = (preRes.data  || []);
      state.fullApps = (fullRes.data || []);
      updateStats();
      renderFilters();
      renderList();
    });
  }

  function updateStats() {
    var all = state.preApps.concat(state.fullApps);
    document.getElementById('st-pre').textContent    = state.preApps.length;
    document.getElementById('st-full').textContent   = state.fullApps.length;
    document.getElementById('st-pending').textContent = all.filter(function(a){ return a.status === 'pending'; }).length;
    var approved = all.filter(function(a){ return a.status === 'approved' || a.status === 'approved_to_view'; }).length;
    document.getElementById('st-approved').textContent = approved;
  }

  /* ── TABS ──────────────────────────────────────────────────── */
  tabBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      tabBtns.forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      state.tab = btn.dataset.tab;
      state.filter = 'all';
      state.selectedId = null;
      renderFilters();
      renderList();
      detailPane.innerHTML = '<div class="detail-empty">← Select an application to view details</div>';
    });
  });

  /* ── FILTERS ───────────────────────────────────────────────── */
  function renderFilters() {
    var statuses = state.tab === 'pre' ? PRE_STATUSES : FULL_STATUSES;
    filterRow.innerHTML = '';
    statuses.forEach(function(s) {
      var chip = document.createElement('button');
      chip.className = 'chip' + (state.filter === s ? ' active' : '');
      chip.textContent = s === 'all' ? 'All' : prettyStatus(s);
      chip.addEventListener('click', function() {
        state.filter = s;
        renderFilters();
        renderList();
      });
      filterRow.appendChild(chip);
    });
    /* Export All button — always at right of filter row */
    var wrap = document.createElement('div');
    wrap.className = 'filter-export-wrap';
    var exportAll = document.createElement('button');
    exportAll.className = 'btn-export-all';
    exportAll.textContent = '⬇ Export All .xlsx';
    exportAll.title = 'Export all currently filtered applications to Excel';
    exportAll.addEventListener('click', function() { exportAll_fn(); });
    wrap.appendChild(exportAll);
    filterRow.appendChild(wrap);
  }

  /* ── LIST ──────────────────────────────────────────────────── */
  function currentApps() {
    var apps = state.tab === 'pre' ? state.preApps : state.fullApps;
    if (state.filter === 'all') return apps;
    return apps.filter(function(a){ return a.status === state.filter; });
  }

  function renderList() {
    var apps = currentApps();
    listPane.innerHTML = '';
    if (!apps.length) {
      listPane.innerHTML = '<div class="no-results">No applications found.</div>';
      return;
    }
    apps.forEach(function(app) {
      var row = document.createElement('div');
      row.className = 'app-row' + (app.id === state.selectedId ? ' selected' : '');
      var name = app.full_name || '(No name)';
      var addr = app.property_address || '';
      var date = app.created_at ? app.created_at.slice(0,10) : '';
      var badgeClass = 'badge badge-' + (app.status || 'pending');
      row.innerHTML =
        '<div class="app-row-name">' + esc(name) + '</div>' +
        '<div class="app-row-meta">' +
          '<span>' + esc(addr || '—') + '</span>' +
          '<span>' + date + '</span>' +
          '<span><span class="' + badgeClass + '">' + prettyStatus(app.status) + '</span></span>' +
        '</div>';
      row.addEventListener('click', function() {
        state.selectedId = app.id;
        renderList();
        renderDetail(app);
      });
      listPane.appendChild(row);
    });
  }

  /* ── DETAIL ────────────────────────────────────────────────── */
  function renderDetail(app) {
    var isPre = state.tab === 'pre';
    var statuses = isPre ? PRE_STATUSES.slice(1) : FULL_STATUSES.slice(1);

    /* Income:Rent ratio chip */
    var ratioHtml = '';
    if (isPre) {
      var gross = parseFloat(app.gross_monthly_income) || 0;
      var rent  = parseFloat(app.monthly_rental) || 0;
    } else {
      var gross = parseFloat(app.gross_monthly_income) || 0;
      var rent  = parseFloat(app.monthly_rent) || 0;
    }
    if (gross && rent) {
      var ratio = (gross / rent).toFixed(1);
      var cls = parseFloat(ratio) >= 3 ? 'ratio-green' : parseFloat(ratio) >= 2.5 ? 'ratio-yellow' : 'ratio-red';
      ratioHtml = ' <span class="ratio-chip ' + cls + '">Income:Rent ' + ratio + 'x</span>';
    }

    var html = '';

    /* Header */
    html += '<div class="detail-header">';
    html += '<h2>' + esc(app.full_name || '(No name)') + '</h2>';
    html += '<div class="detail-header-meta">';
    html += '<span>' + esc(app.email || '') + '</span>';
    html += '<span>' + esc(app.mobile || '') + '</span>';
    html += '<span class="badge badge-' + (app.status||'pending') + '">' + prettyStatus(app.status) + '</span>';
    html += ratioHtml;
    html += '</div></div>';

    /* Status updater */
    var opts = statuses.map(function(s) {
      return '<option value="' + s + '"' + (app.status === s ? ' selected' : '') + '>' + prettyStatus(s) + '</option>';
    }).join('');
    html += '<div class="status-row">';
    html += '<label>Update status:</label>';
    html += '<select id="status-select">' + opts + '</select>';
    html += '<button class="btn-save" id="btn-save-status">Save</button>';
    html += '<span class="save-msg" id="save-msg">✓ Saved</span>';
    html += '<button class="btn-export" id="btn-export-single" title="Export this applicant to Excel">⬇ Export .xlsx</button>';
    html += '</div>';

    /* Body */
    html += '<div class="detail-body">';

    /* Property */
    html += section('Property Details', [
      field('Property Address', app.property_address),
      field('Unit', app.unit_number),
      field('Listing Ref', app.listing_reference),
      field('Move-in Date', app.move_in_date),
      field('Monthly Rent/Rental', app.monthly_rent || app.monthly_rental),
      field('Lease Term', app.lease_term),
      field('Parking Required', app.parking_required !== undefined ? (app.parking_required ? 'Yes' : 'No') : null)
    ]);

    /* Personal */
    html += section('Personal Information', [
      field('Full Name', app.full_name),
      field('Date of Birth', app.date_of_birth),
      field('ID / Passport', app.id_number || app.id_passport_number),
      field('Nationality', app.nationality),
      field('Mobile', app.mobile),
      field('Alternate Phone', app.alternate_phone),
      field('Email', app.email),
      field('Current Address', app.current_address),
      field('Time at Address', app.time_at_address),
      field('Reason for Leaving', app.reason_for_leaving)
    ]);

    /* Occupants */
    if (!isPre) {
      var occ = tryParse(app.co_occupants, []);
      if (occ.length) {
        html += '<div class="detail-section"><h3>Co-Occupants / Co-Applicants</h3>';
        html += '<table class="mini-table"><thead><tr><th>Name</th><th>DOB</th><th>Relationship</th><th>ID / Age</th></tr></thead><tbody>';
        occ.forEach(function(o) {
          html += '<tr><td>' + esc(o.name||'') + '</td><td>' + esc(o.dob||'') + '</td><td>' + esc(o.relationship||'') + '</td><td>' + esc(o.id_or_age||'') + '</td></tr>';
        });
        html += '</tbody></table></div>';
      }
    } else {
      html += section('Occupants', [
        field('Total Occupants', app.total_occupants),
        field('Adults', app.num_adults),
        field('Minors', app.num_minors),
        field('Pets', app.pets)
      ]);
    }

    /* Employment */
    html += section('Employment & Income', [
      field('Employment Status / Type', app.employment_status || app.employment_type),
      field('Employer Name', app.employer_name),
      field('Job Title', app.job_title),
      field('Employer Phone', app.employer_phone),
      field('Employer Address', app.employer_address),
      field('Employment Start Date', app.employment_start_date),
      field('Gross Monthly Income', fmtRand(app.gross_monthly_income)),
      field('Net Monthly Income', fmtRand(app.net_monthly_income)),
      field('Monthly Debt', fmtRand(app.monthly_debt))
    ]);

    /* Additional income (full apps) */
    if (!isPre) {
      var addInc = tryParse(app.additional_income, []);
      if (addInc.length) {
        html += '<div class="detail-section"><h3>Additional Income</h3>';
        html += '<table class="mini-table"><thead><tr><th>Source</th><th>Amount</th></tr></thead><tbody>';
        addInc.forEach(function(i) {
          html += '<tr><td>' + esc(i.source||'') + '</td><td>' + fmtRand(i.amount) + '</td></tr>';
        });
        html += '</tbody></table></div>';
      }
    }

    /* Rental history */
    html += section('Current Landlord', landlordFields(app.current_landlord || { name: app.landlord_name, phone: app.landlord_phone }));
    if (!isPre) {
      html += section('Previous Landlord', landlordFields(app.previous_landlord));
    }

    /* References (full apps) */
    if (!isPre) {
      var refs = tryParse(app.personal_references, []);
      if (refs.length) {
        html += '<div class="detail-section"><h3>Personal References</h3>';
        html += '<table class="mini-table"><thead><tr><th>Name</th><th>Relationship</th><th>Phone</th><th>Email</th></tr></thead><tbody>';
        refs.forEach(function(r) {
          html += '<tr><td>' + esc(r.name||'') + '</td><td>' + esc(r.relationship||'') + '</td><td>' + esc(r.phone||'') + '</td><td>' + esc(r.email||'') + '</td></tr>';
        });
        html += '</tbody></table></div>';
      }
    }

    /* Vehicles / Pets (full apps) */
    if (!isPre) {
      html += section('Vehicles & Pets', [
        field('Vehicle Make / Model', app.vehicle_make_model),
        field('Vehicle Registration', app.vehicle_registration),
        field('Pet Types', app.pet_types),
        field('Pet Count', app.pet_count)
      ]);
    }

    /* Declarations (full apps) */
    if (!isPre && app.declarations) {
      var decls = tryParse(app.declarations, {});
      var keys = Object.keys(decls);
      if (keys.length) {
        html += '<div class="detail-section"><h3>Declarations</h3><div class="decl-grid">';
        keys.forEach(function(k) {
          var val = decls[k];
          var isYes = val === true || val === 'yes' || val === 'Yes';
          html += '<div class="decl-item"><span class="' + (isYes ? 'decl-yes' : 'decl-no') + '">' + (isYes ? '✗' : '✓') + '</span><span>' + esc(k.replace(/_/g,' ')) + '</span></div>';
        });
        html += '</div></div>';
      }
    }

    /* Eviction history (pre apps) */
    if (isPre) {
      html += section('History & Declarations', [
        field('Eviction History', app.eviction_history),
        field('Eviction Details', app.eviction_details)
      ]);
    }

    /* Signature */
    html += section('Consent & Signature', [
      field('Print Name', app.applicant_print_name || app.signature_name),
      field('Co-Applicant Signature', app.co_applicant_signature_name),
      field('Signature Date', app.signature_date),
      field('Place of Signature', app.place_of_signature),
      field('Info Accurate', app.consent_info_accurate !== undefined ? (app.consent_info_accurate ? 'Yes' : 'No') : (app.consents_acknowledged !== undefined ? (app.consents_acknowledged ? 'Yes' : 'No') : null)),
      field('POPIA Consent', app.consent_popia !== undefined ? (app.consent_popia ? 'Yes' : 'No') : null),
      field('Vetting Fee Consent', app.consent_vetting_fee !== undefined ? (app.consent_vetting_fee ? 'Yes' : 'No') : null),
      field('Viewing Terms', app.consent_viewing_terms !== undefined ? (app.consent_viewing_terms ? 'Yes' : 'No') : null)
    ]);

    html += '<div style="font-size:0.72rem;color:var(--muted);margin-top:8px;">Submitted: ' + (app.created_at ? app.created_at.replace('T',' ').slice(0,19) : '—') + ' UTC</div>';
    html += '</div>'; /* detail-body */

    detailPane.innerHTML = html;

    /* Export single button */
    var exportBtn = document.getElementById('btn-export-single');
    if (exportBtn) {
      exportBtn.addEventListener('click', function() { exportSingle(app, isPre); });
    }

    /* Status save button */
    var saveBtn = document.getElementById('btn-save-status');
    var saveMsg = document.getElementById('save-msg');
    if (saveBtn) {
      saveBtn.addEventListener('click', function() {
        var newStatus = document.getElementById('status-select').value;
        var table = isPre ? 'pre_applications' : 'rental_applications';
        saveBtn.disabled = true;
        saveMsg.style.display = 'none';
        _client.from(table).update({ status: newStatus }).eq('id', app.id).then(function(res) {
          saveBtn.disabled = false;
          if (res.error) { alert('Save error: ' + res.error.message); return; }
          app.status = newStatus;
          saveMsg.style.display = 'inline';
          setTimeout(function(){ saveMsg.style.display = 'none'; }, 3000);
          /* Update list badge */
          var apps = isPre ? state.preApps : state.fullApps;
          var idx = apps.findIndex(function(a){ return a.id === app.id; });
          if (idx !== -1) apps[idx].status = newStatus;
          updateStats();
          renderList();
        });
      });
    }
  }

  /* ── Helpers ───────────────────────────────────────────────── */
  function esc(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function fmtRand(val) {
    if (val == null || val === '') return null;
    var n = parseFloat(val);
    if (isNaN(n)) return String(val);
    return 'R ' + n.toLocaleString('en-ZA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function tryParse(val, fallback) {
    if (!val) return fallback;
    if (typeof val === 'object') return val;
    try { return JSON.parse(val); } catch(e) { return fallback; }
  }

  function field(label, value) {
    return { label: label, value: value };
  }

  function section(title, fields) {
    var visible = fields.filter(function(f){ return f.value != null && f.value !== '' && f.value !== undefined; });
    if (!visible.length) return '';
    var html = '<div class="detail-section"><h3>' + esc(title) + '</h3><div class="detail-grid">';
    visible.forEach(function(f) {
      html += '<div class="detail-field"><label>' + esc(f.label) + '</label><span>' + esc(f.value) + '</span></div>';
    });
    html += '</div></div>';
    return html;
  }

  function landlordFields(ll) {
    if (!ll) return [];
    var obj = typeof ll === 'object' ? ll : tryParse(ll, {});
    return [
      field('Name', obj.name || obj.landlord_name),
      field('Phone', obj.phone || obj.landlord_phone),
      field('Address', obj.address),
      field('Monthly Rent', fmtRand(obj.monthly_rent)),
      field('Start Date', obj.start_date),
      field('End Date', obj.end_date),
      field('Reason for Leaving', obj.reason_for_leaving)
    ];
  }

  /* ── EXPORT HELPERS ────────────────────────────────────────── */

  function xlsDate() { return new Date().toISOString().slice(0,10); }

  function safeStr(v) {
    if (v == null) return '';
    if (typeof v === 'object') return JSON.stringify(v);
    return String(v);
  }

  function applyColWidths(ws, widths) {
    ws['!cols'] = widths.map(function(w) { return { wch: w }; });
  }

  /* Style header row bold */
  function boldHeader(ws, numCols) {
    for (var c = 0; c < numCols; c++) {
      var cell = ws[XLSX.utils.encode_cell({ r: 0, c: c })];
      if (cell) { cell.s = { font: { bold: true } }; }
    }
  }

  /* ── Export single applicant ── */
  function exportSingle(app, isPre) {
    var wb = XLSX.utils.book_new();

    /* ---- Sheet 1: Details (two-column label/value) ---- */
    var rows = [['Field', 'Value']];
    function addRow(label, val) { rows.push([label, safeStr(val)]); }
    function addBlank() { rows.push(['', '']); }
    function addHead(title) { rows.push(['── ' + title + ' ──', '']); }

    addHead('SUBMISSION');
    addRow('Submitted (UTC)', app.created_at ? app.created_at.replace('T',' ').slice(0,19) : '');
    addRow('Status', prettyStatus(app.status));

    addBlank();
    addHead('PROPERTY');
    addRow('Property Address', app.property_address);
    addRow('Unit Number', app.unit_number);
    addRow('Listing Reference', app.listing_reference);
    addRow('Move-in Date', app.move_in_date);
    addRow('Monthly Rent/Rental', app.monthly_rent || app.monthly_rental);
    addRow('Lease Term', app.lease_term);
    if (!isPre) addRow('Parking Required', app.parking_required ? 'Yes' : 'No');

    addBlank();
    addHead('PERSONAL INFORMATION');
    addRow('Full Name', app.full_name);
    addRow('Date of Birth', app.date_of_birth);
    addRow('ID / Passport Number', app.id_number || app.id_passport_number);
    addRow('Nationality', app.nationality);
    addRow('Mobile', app.mobile);
    addRow('Alternate Phone', app.alternate_phone);
    addRow('Email', app.email);
    addRow('Current Address', app.current_address);
    addRow('Time at Current Address', app.time_at_address);
    addRow('Reason for Leaving', app.reason_for_leaving);

    addBlank();
    addHead('OCCUPANTS');
    if (isPre) {
      addRow('Total Occupants', app.total_occupants);
      addRow('Adults', app.num_adults);
      addRow('Minors', app.num_minors);
      addRow('Pets', app.pets);
    }

    addBlank();
    addHead('EMPLOYMENT & INCOME');
    addRow('Employment Status/Type', app.employment_status || app.employment_type);
    addRow('Employer Name', app.employer_name);
    addRow('Job Title', app.job_title);
    addRow('Employment Start Date', app.employment_start_date);
    addRow('Employer Phone', app.employer_phone);
    addRow('Employer Address', app.employer_address);
    addRow('Gross Monthly Income', app.gross_monthly_income);
    addRow('Net Monthly Income', app.net_monthly_income);
    addRow('Monthly Debt', app.monthly_debt);

    addBlank();
    addHead('CURRENT LANDLORD');
    var ll = tryParse(app.current_landlord, null) || { name: app.landlord_name, phone: app.landlord_phone };
    if (ll) {
      addRow('Landlord Name', ll.name || ll.landlord_name);
      addRow('Landlord Phone', ll.phone || ll.landlord_phone);
      addRow('Landlord Address', ll.address);
      addRow('Monthly Rent', ll.monthly_rent);
      addRow('Tenancy Start', ll.start_date);
      addRow('Tenancy End', ll.end_date);
      addRow('Reason for Leaving', ll.reason_for_leaving);
    }

    if (!isPre) {
      addBlank();
      addHead('PREVIOUS LANDLORD');
      var pl = tryParse(app.previous_landlord, null);
      if (pl) {
        addRow('Landlord Name', pl.name);
        addRow('Landlord Phone', pl.phone);
        addRow('Landlord Address', pl.address);
        addRow('Monthly Rent', pl.monthly_rent);
        addRow('Tenancy Start', pl.start_date);
        addRow('Tenancy End', pl.end_date);
        addRow('Reason for Leaving', pl.reason_for_leaving);
      }

      addBlank();
      addHead('VEHICLES & PETS');
      addRow('Vehicle Make / Model', app.vehicle_make_model);
      addRow('Vehicle Registration', app.vehicle_registration);
      addRow('Pet Types', app.pet_types);
      addRow('Pet Count', app.pet_count);
    }

    if (isPre) {
      addBlank();
      addHead('HISTORY & DECLARATIONS');
      addRow('Eviction History', app.eviction_history);
      addRow('Eviction Details', app.eviction_details);
    }

    addBlank();
    addHead('CONSENT & SIGNATURE');
    addRow('Print Name', app.applicant_print_name || app.signature_name);
    addRow('Co-Applicant Signature', app.co_applicant_signature_name);
    addRow('Signature Date', app.signature_date);
    addRow('Place of Signature', app.place_of_signature);
    addRow('Info Accurate', app.consent_info_accurate ? 'Yes' : (app.consents_acknowledged ? 'Yes' : 'No'));
    addRow('POPIA Consent', app.consent_popia != null ? (app.consent_popia ? 'Yes' : 'No') : '');
    addRow('Vetting Fee Consent', app.consent_vetting_fee != null ? (app.consent_vetting_fee ? 'Yes' : 'No') : '');
    addRow('Viewing Terms Accepted', app.consent_viewing_terms != null ? (app.consent_viewing_terms ? 'Yes' : 'No') : '');
    addRow('No Inducement', app.consent_no_inducement != null ? (app.consent_no_inducement ? 'Yes' : 'No') : '');

    var ws1 = XLSX.utils.aoa_to_sheet(rows);
    applyColWidths(ws1, [34, 46]);
    XLSX.utils.book_append_sheet(wb, ws1, 'Details');

    /* ---- Sheet 2: Co-Occupants (full apps) ---- */
    if (!isPre) {
      var occ = tryParse(app.co_occupants, []);
      if (occ.length) {
        var occRows = [['Name', 'Date of Birth', 'Relationship', 'ID / Age']];
        occ.forEach(function(o) { occRows.push([safeStr(o.name), safeStr(o.dob), safeStr(o.relationship), safeStr(o.id_or_age)]); });
        var ws2 = XLSX.utils.aoa_to_sheet(occRows);
        applyColWidths(ws2, [26, 16, 18, 18]);
        XLSX.utils.book_append_sheet(wb, ws2, 'Co-Occupants');
      }

      /* ---- Sheet 3: Personal References ---- */
      var refs = tryParse(app.personal_references, []);
      if (refs.length) {
        var refRows = [['Name', 'Relationship', 'Phone', 'Email']];
        refs.forEach(function(r) { refRows.push([safeStr(r.name), safeStr(r.relationship), safeStr(r.phone), safeStr(r.email)]); });
        var ws3 = XLSX.utils.aoa_to_sheet(refRows);
        applyColWidths(ws3, [26, 18, 18, 30]);
        XLSX.utils.book_append_sheet(wb, ws3, 'References');
      }

      /* ---- Sheet 4: Additional Income ---- */
      var addInc = tryParse(app.additional_income, []);
      if (addInc.length) {
        var incRows = [['Source', 'Amount (R)']];
        addInc.forEach(function(i) { incRows.push([safeStr(i.source), safeStr(i.amount)]); });
        var ws4 = XLSX.utils.aoa_to_sheet(incRows);
        applyColWidths(ws4, [30, 16]);
        XLSX.utils.book_append_sheet(wb, ws4, 'Additional Income');
      }

      /* ---- Sheet 5: Declarations ---- */
      var decls = tryParse(app.declarations, {});
      var dkeys = Object.keys(decls);
      if (dkeys.length) {
        var dRows = [['Declaration', 'Answer']];
        dkeys.forEach(function(k) {
          var v = decls[k];
          var ans = (v === true || v === 'yes' || v === 'Yes') ? 'YES' : 'No';
          dRows.push([k.replace(/_/g,' '), ans]);
        });
        var ws5 = XLSX.utils.aoa_to_sheet(dRows);
        applyColWidths(ws5, [40, 10]);
        XLSX.utils.book_append_sheet(wb, ws5, 'Declarations');
      }
    }

    var safeName = (app.full_name || 'Applicant').replace(/[^a-zA-Z0-9 _-]/g, '').trim().replace(/\s+/g, '_');
    XLSX.writeFile(wb, 'Napolitani_' + safeName + '_' + xlsDate() + '.xlsx');
  }

  /* ── Export all filtered applicants (flat table) ── */
  function exportAll_fn() {
    var apps = currentApps();
    if (!apps.length) { alert('No applications to export.'); return; }
    var isPre = state.tab === 'pre';
    var wb = XLSX.utils.book_new();

    if (isPre) {
      var headers = [
        'Submitted (UTC)', 'Status',
        'Full Name', 'ID/Passport', 'Nationality', 'Date of Birth', 'Mobile', 'Email', 'Current Address',
        'Property Address', 'Listing Ref', 'Monthly Rental', 'Move-in Date', 'Lease Term',
        'Employment Status', 'Employer', 'Employer Phone', 'Gross Income', 'Net Income', 'Monthly Debt',
        'Total Occupants', 'Adults', 'Minors', 'Pets',
        'Landlord Name', 'Landlord Phone', 'Reason for Leaving', 'Eviction History', 'Eviction Details',
        'Info Accurate', 'POPIA Consent', 'Vetting Fee Consent', 'Viewing Terms', 'Print Name', 'Signature Date'
      ];
      var rows = [headers];
      apps.forEach(function(a) {
        rows.push([
          safeStr(a.created_at ? a.created_at.replace('T',' ').slice(0,19) : ''),
          prettyStatus(a.status),
          safeStr(a.full_name), safeStr(a.id_passport_number), safeStr(a.nationality), safeStr(a.date_of_birth),
          safeStr(a.mobile), safeStr(a.email), safeStr(a.current_address),
          safeStr(a.property_address), safeStr(a.listing_reference), safeStr(a.monthly_rental),
          safeStr(a.move_in_date), safeStr(a.lease_term),
          safeStr(a.employment_status), safeStr(a.employer_name), safeStr(a.employer_phone),
          safeStr(a.gross_monthly_income), safeStr(a.net_monthly_income), safeStr(a.monthly_debt),
          safeStr(a.total_occupants), safeStr(a.num_adults), safeStr(a.num_minors), safeStr(a.pets),
          safeStr(a.landlord_name), safeStr(a.landlord_phone), safeStr(a.reason_for_leaving),
          safeStr(a.eviction_history), safeStr(a.eviction_details),
          a.consent_info_accurate ? 'Yes' : 'No',
          a.consent_popia ? 'Yes' : 'No',
          a.consent_vetting_fee ? 'Yes' : 'No',
          a.consent_viewing_terms ? 'Yes' : 'No',
          safeStr(a.applicant_print_name), safeStr(a.signature_date)
        ]);
      });
      var ws = XLSX.utils.aoa_to_sheet(rows);
      applyColWidths(ws, [20,18,26,18,14,14,16,28,36,36,16,14,14,16,18,24,16,14,14,14,10,8,8,16,24,16,24,14,24,10,10,10,10,24,14]);
      XLSX.utils.book_append_sheet(wb, ws, 'Pre-Applications');
    } else {
      var headers = [
        'Submitted (UTC)', 'Status',
        'Full Name', 'ID Number', 'Date of Birth', 'Mobile', 'Alt Phone', 'Email', 'Current Address', 'Time at Address',
        'Property Address', 'Unit', 'Move-in Date', 'Monthly Rent', 'Lease Term', 'Parking',
        'Employment Type', 'Employer', 'Job Title', 'Employment Start', 'Employer Phone',
        'Gross Income', 'Net Income',
        'Landlord Name', 'Landlord Phone', 'Reason for Leaving',
        'Vehicle Make/Model', 'Vehicle Reg', 'Pet Types', 'Pet Count',
        'Consents Acknowledged', 'Signature Name', 'Signature Date', 'Co-Applicant Signature'
      ];
      var rows = [headers];
      apps.forEach(function(a) {
        var ll = tryParse(a.current_landlord, {});
        rows.push([
          safeStr(a.created_at ? a.created_at.replace('T',' ').slice(0,19) : ''),
          prettyStatus(a.status),
          safeStr(a.full_name), safeStr(a.id_number), safeStr(a.date_of_birth),
          safeStr(a.mobile), safeStr(a.alternate_phone), safeStr(a.email),
          safeStr(a.current_address), safeStr(a.time_at_address),
          safeStr(a.property_address), safeStr(a.unit_number), safeStr(a.move_in_date),
          safeStr(a.monthly_rent), safeStr(a.lease_term), a.parking_required ? 'Yes' : 'No',
          safeStr(a.employment_type), safeStr(a.employer_name), safeStr(a.job_title),
          safeStr(a.employment_start_date), safeStr(a.employer_phone),
          safeStr(a.gross_monthly_income), safeStr(a.net_monthly_income),
          safeStr(ll.name || a.landlord_name), safeStr(ll.phone || a.landlord_phone),
          safeStr(a.reason_for_leaving),
          safeStr(a.vehicle_make_model), safeStr(a.vehicle_registration),
          safeStr(a.pet_types), safeStr(a.pet_count),
          a.consents_acknowledged ? 'Yes' : 'No',
          safeStr(a.signature_name), safeStr(a.signature_date), safeStr(a.co_applicant_signature_name)
        ]);
      });
      var ws = XLSX.utils.aoa_to_sheet(rows);
      applyColWidths(ws, [20,18,26,18,14,16,16,28,36,18,36,10,14,14,16,10,18,24,20,16,16,14,14,24,16,24,22,16,16,10,12,24,14,24]);
      XLSX.utils.book_append_sheet(wb, ws, 'Full Applications');
    }

    var label = isPre ? 'Pre' : 'Full';
    var filterLabel = state.filter === 'all' ? 'All' : prettyStatus(state.filter).replace(/\s+/g,'_');
    XLSX.writeFile(wb, 'Napolitani_' + label + '_' + filterLabel + '_' + xlsDate() + '.xlsx');
  }

  /* Init filters */
  renderFilters();

})();
</script>
</body>
